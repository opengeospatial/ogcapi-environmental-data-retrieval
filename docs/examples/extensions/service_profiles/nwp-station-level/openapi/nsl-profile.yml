openapi: 3.1.1
info:
  title: NWP Station Level profile of OGC API-EDR
  description: NWP Station Level profile of OGC API - Environmental Data Retrieval Standard OpenAPI document
  version: 1.0.0
  license:
    name: OGC License
    url: https://www.ogc.org/legal
paths:
  /collections/{collectionid}:
    get:
      tags:
        - Instances of NWP Station level metadata
      summary: NWP Station Level Instances metadata
      description: >-
        NWP Station level extent, parameter and query support metadata
      operationId: getNWPStationLevelInstances
      parameters:
        - $ref: '#/components/parameters/collectionid'
        - $ref: '#/components/parameters/nsl-f1'
      responses:
        '200':
          $ref: '#/components/responses/nsl-collection'
        '404':
          $ref: '#/components/responses/exception'
        default:
          $ref: '#/components/responses/exception'
  /collections/{collectionid}/instances:
    get:
      tags:
        - NWP Station level Instances metadata
      summary: List data instances of the {collectionid} Collection
      description: >-
        This will provide list of the avalable instances of the {collectionid} collection Use
        content negotiation to request HTML or JSON.
      operationId: getNWPStationLevelInstances
      parameters:
        - $ref: '#/components/parameters/collectionid'
        - $ref: '#/components/parameters/nsl-f1'
      responses:
        '200':
          $ref: '#/components/responses/nsl-instances'
        '404':
          $ref: '#/components/responses/exception'
        default:
          $ref: '#/components/responses/exception'
  /collections/{collectionid}/instances/{instanceid}:
    get:
      tags:
        - NWP Station level Instance metadata
      summary: Instance of the {collectionid} Collection metadata
      description: >-
        This will provide the instance of the {collectionid} collection Use
        content negotiation to request HTML or JSON.
      operationId: getNWPStationLevelInstances
      parameters:
        - $ref: '#/components/parameters/collectionid'
        - $ref: '#/components/parameters/instanceid'
        - $ref: '#/components/parameters/nsl-f1'
      responses:
        '200':
          $ref: '#/components/responses/nsl-instance'
        '404':
          $ref: '#/components/responses/exception'
        default:
          $ref: '#/components/responses/exception'
  /collections/{collectionid}/instances/{instanceid}/area:
    get:
      tags:
        - NWP Station level Instance area data query
      summary: >-
        Query end point for area queries of instance {instanceid} of the {collectionid} collection
        defined by a polygon
      description: Return the data values for the data area defined by the query parameters
      operationId: GetNWPStationLevelInstanceDataForArea
      parameters:
        - $ref: '#/components/parameters/collectionid'
        - $ref: '#/components/parameters/instanceid'
        - $ref: '#/components/parameters/areaCoords'
        - $ref: '#/components/parameters/datetime'
        - $ref: '#/components/parameters/nsl-parameter-name'
        - $ref: '#/components/parameters/nsl-crs'
        - $ref: '#/components/parameters/nsl-f3'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          $ref: '#/components/responses/nsl-200'
        '204':
          $ref: '#/components/responses/204'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '413':
          $ref: '#/components/responses/413'
        default:
          $ref: '#/components/responses/exception'
    post:
      tags:
        - NWP Station level Instance area data query
      summary: >-
        Query end point for area queries of instance {instanceid} of the {collectionid} collection
        defined by a polygon
      description: Return the data values for the data area defined by the query parameters
      operationId: PostNWPStationLevelInstanceDataForArea
      parameters:
        - $ref: '#/components/parameters/collectionid'
        - $ref: '#/components/parameters/instanceid'
      requestBody:
        $ref: '#/components/requestBodies/nsl-area'
      responses:
        '200':
          $ref: '#/components/responses/nsl-200'
        '204':
          $ref: '#/components/responses/204'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '413':
          $ref: '#/components/responses/413'
        default:
          $ref: '#/components/responses/exception'
  /collections/{collectionid}/instances/{instanceid}/locations:
    get:
      tags:
        - NWP Station level Instance locations data query
      summary: >-
        Query end point for locations query of instance {instanceid} of the {collectionid} collection
        returns a list of the available locations
      description: Return the available locations
      operationId: GetNWPStationLevelInstanceDataForLocations
      parameters:
        - $ref: '#/components/parameters/collectionid'
        - $ref: '#/components/parameters/instanceid'
      responses:
        '200':
          $ref: '#/components/responses/nsl-200'
        '204':
          $ref: '#/components/responses/204'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '413':
          $ref: '#/components/responses/413'
        default:
          $ref: '#/components/responses/exception'
    post:
      tags:
        - NWP Station level Instance locations data query
      summary: >-
        Query end point for locations query of instance {instanceid} of the {collectionid} collection
        returns a list of the available locations
      description: Return the data values for the data Cube defined by the query parameters
      operationId: PostNWPStationLevelInstanceDataForLocations
      parameters:
        - $ref: '#/components/parameters/collectionid'
        - $ref: '#/components/parameters/instanceid'
      responses:
        '200':
          $ref: '#/components/responses/nsl-200'
        '204':
          $ref: '#/components/responses/204'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '413':
          $ref: '#/components/responses/413'
        default:
          $ref: '#/components/responses/exception'
  /collections/{collectionid}/instances/{instanceid}/locations/{locationid}:
    get:
      tags:
        - NWP Station level Instance data for requested locations
      summary: >-
        location query end point for position queries of instance {instanceid} of
        the {collectionid} collection
      description: Query end point for location queries
      operationId: GetNWPStationLevelInstanceDataForLocation
      parameters:
        - $ref: '#/components/parameters/collectionid'
        - $ref: '#/components/parameters/instanceid'
        - $ref: '#/components/parameters/locationid'
        - $ref: '#/components/parameters/datetime'
        - $ref: '#/components/parameters/nsl-parameter-name'
        - $ref: '#/components/parameters/nsl-crs'
        - $ref: '#/components/parameters/nsl-f2'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          $ref: '#/components/responses/nsl-200'
        '204':
          $ref: '#/components/responses/204'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '413':
          $ref: '#/components/responses/413'
        default:
          $ref: '#/components/responses/exception'
    post:
      tags:
        - NWP Station level Instance location data query
      summary: >-
        Query end point for specifuc location queries of instance {instanceid} of
        the {collectionid} collection
      description: Query end point for location queries
      operationId: PostNWPStationLevelInstanceDataForLocation
      parameters:
        - $ref: '#/components/parameters/collectionid'
        - $ref: '#/components/parameters/instanceid'
        - $ref: '#/components/parameters/locationid'
      requestBody:
        $ref: '#/components/requestBodies/nsl-location'
      responses:
        '200':
          $ref: '#/components/responses/204'
        '204':
          $ref: '#/components/responses/204'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '413':
          $ref: '#/components/responses/413'
        default:
          $ref: '#/components/responses/exception'

  /collections/{collectionid}/instances/{instanceid}/position:
    get:
      tags:
        - NWP Station level Instance position data query
      summary: >-
        Query end point for position queries of instance {instanceid} of
        the {collectionid} collection
      description: Query end point for position queries
      operationId: GetNWPStationLevelInstanceDataForPoint
      parameters:
        - $ref: '#/components/parameters/collectionid'
        - $ref: '#/components/parameters/instanceid'
        - $ref: '#/components/parameters/positionCoords'
        - $ref: '#/components/parameters/datetime'
        - $ref: '#/components/parameters/nsl-parameter-name'
        - $ref: '#/components/parameters/nsl-crs'
        - $ref: '#/components/parameters/nsl-f2'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          $ref: '#/components/responses/nsl-200'
        '204':
          $ref: '#/components/responses/204'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '413':
          $ref: '#/components/responses/413'
        default:
          $ref: '#/components/responses/exception'
    post:
      tags:
        - NWP Station level Instance position data query
      summary: >-
        Query end point for position queries of instance {instanceid} of
        the {collectionid} collection
      description: Query end point for position queries
      operationId: PostNWPStationLevelInstanceDataForPoint
      parameters:
        - $ref: '#/components/parameters/collectionid'
        - $ref: '#/components/parameters/instanceid'
      requestBody:
        $ref: '#/components/requestBodies/nsl-position'
      responses:
        '200':
          $ref: '#/components/responses/204'
        '204':
          $ref: '#/components/responses/204'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '413':
          $ref: '#/components/responses/413'
        default:
          $ref: '#/components/responses/exception'
components:
  parameters:
    collectionid:
      name: collectionid
      in: path
      required: true
      description: Station level collection id
      schema:
        type: string
        pattern: '^[a-z0-9]+_[a-z0-9]+_stnlvl$'
    instanceid:
      name: instanceid
      in: path
      required: true
      description: Instance id format YYYYmmddTHHMMZ
      schema:
        type: string
        pattern: '^[0-9]{8}T[0-9]{4}Z$'
    locationid:
      name: locationid
      in: path
      required: true
      description: Location id
      schema:
        type: string
    nsl-f1:
      name: f
      in: query
      description: format to return the data response in
      required: false
      schema:
        type: string
      enum:
        - json
        - html
    nsl-f2:
      name: f
      in: query
      description: format to return the position data response in
      required: false
      schema:
        type: string
      enum:
        - CoverageJSON
        - GeoJSON
        - CSV
    nsl-f3:
      name: f
      in: query
      description: format to return the position data response in
      required: false
      schema:
        type: string
      enum:
        - GRIB2
        - CoverageJSON
        - CF-NetCDF
    datetime:
      name: datetime
      in: query
      description: >-
        Either a date-time or an interval, open or closed. Date and time
        expressions adhere to RFC 3339. Open intervals are expressed using
        double-dots.

        Examples:

        * A date-time: "2018-02-12T23:20:50Z" * A closed interval:
        "2018-02-12T00:00:00Z/2018-03-18T12:31:12Z" * Open intervals:
        "2018-02-12T00:00:00Z/.." or "../2018-03-18T12:31:12Z"

        Only features that have a temporal property that intersects the value of
        `datetime` are selected.

        If a feature has multiple temporal properties, it is the decision of the
        server whether only a single temporal property is used to determine the
        extent or all relevant temporal properties.
      required: false
      schema:
        type: string
      style: form
      explode: false
    positionCoords:
      name: coords
      in: query
      description: >
        location(s) to return data for, the coordinates are defined by a Well
        Known Text

        (wkt) string. to retrieve a single location :


        POINT(x y) i.e. POINT(0 51.48) for Greenwich, London


        And for a list of locations


        MULTIPOINT((x y),(x1 y1),(x2 y2),(x3 y3))


        i.e.

        MULTIPOINT((38.9 -77),(48.85 2.35),(39.92 116.38),(-35.29 149.1),(51.5
        -0.1))


        see https://portal.ogc.org/files/?artifact_id=25355 and 

        https://en.wikipedia.org/wiki/Well-known_text_representation_of_geometry


        the coordinate values will depend on the CRS parameter, if this is not
        defined

        the values will be assumed to WGS84 values (i.e x=longitude and
        y=latitude)
      required: true
      schema:
        type: string
    nsl-parameter-name:
      name: parameter-name
      in: query
      description: >-
        comma delimited list of parameters to retrieve data for.  Valid
        parameters are listed in the collections metadata
      schema:
        type: string
      enum:
        - z
        - q
        - t
        - u
        - v 
      style: form
      explode: false
      required: false
    nsl-crs:
      name: crs
      in: query
      description: >-
        identifier (id) of the coordinate system to return data in list of valid
        crs identifiers for the chosen collection are defined in the metadata
        responses.  If not supplied the coordinate reference system will default
        to EPSG:4326.
      required: false
      schema:
        type: string
      enum:
        - EPSG:4326
    areaCoords:
      name: coords
      in: query
      description: >-
        Only data that has a geometry that intersects the area defined by the
        polygon

        are selected. 


        The polygon is defined using a Well Known Text string following 


        coords=POLYGON((x y,x1 y1,x2 y2,...,xn yn x y))


        which are values in the coordinate system defined by the crs query
        parameter 

        (if crs is not defined the values will be assumed to be WGS84
        longitude/latitude coordinates).  


        For instance a polygon that roughly describes an area that contains 

        South West England in WGS84 would look like: 


        coords=POLYGON((-6.1 50.3,-4.35 51.4,-2.6 51.6,-2.8 50.6,-5.3
        49.9,-6.1,50.3))


        see https://portal.ogc.org/files/?artifact_id=25355 and 

        https://en.wikipedia.org/wiki/Well-known_text_representation_of_geometry


        The coords parameter will only support 2D POLYGON definitions
      required: true
      schema:
        type: string
    limit:
      name: limit
      in: query
      description: Defines the maximum number of features to return in a request
      required: false
      examples: 
      limitval:
        summary: number of features to return
        value: 10
      schema:
        type: number
  schemas:
    link:
      type: object
      required:
        - href
        - rel
      properties:
        href:
          type: string
          examples:
            - https://example.com/collections/monitoringsites/locations/1234
        rel:
          type: string
          examples:
            - alternate
        type:
          type: string
          examples:
            - application/geo+json
        hreflang:
          type: string
          examples:
            - en
        title:
          type: string
          examples:
            - Monitoring site name
        length:
          type: integer
        templated:
          description: >-
            defines if the link href value is a template with values requiring
            replacement
          type: boolean
    exception:
      type: object
      required:
        - code
      properties:
        code:
          type: string
        description:
          type: string
    extent:
      description: >-
        The extent of the information in the collection. In the Core only
        spatial and temporal

        extents are specified. Extensions may add additional members to
        represent other

        extents, for example, thermal or Station ranges.
      type: object
      properties:
        spatial:
          description: The spatial extent of the information in the collection.
          type: object
          required:
            - bbox
            - crs
          properties:
            bbox:
              description: >-
                One or more bounding boxes that describe the spatial extent of
                the dataset.

                In the Core only a single bounding box is supported. Extensions
                may support

                additional areas. If multiple areas are provided, the union of
                the bounding

                boxes describes the spatial extent.
              type: array
              minItems: 1
              items:
                description: >-
                  Each bounding box is provided as four or six numbers,
                  depending on

                  whether the coordinate reference system includes a vertical
                  axis

                  (height or depth):


                  * Lower left corner, coordinate axis 1

                  * Lower left corner, coordinate axis 2

                  * Minimum value, coordinate axis 3 (optional)

                  * Upper right corner, coordinate axis 1

                  * Upper right corner, coordinate axis 2

                  * Maximum value, coordinate axis 3 (optional)


                  The coordinate reference system of the values is WGS 84
                  longitude/latitude

                  (https://www.opengis.net/def/crs/OGC/1.3/CRS84) unless a
                  different coordinate

                  reference system is specified in `crs`.


                  For WGS 84 longitude/latitude the values are in most cases the
                  sequence of

                  minimum longitude, minimum latitude, maximum longitude and
                  maximum latitude.

                  However, in cases where the box spans the antimeridian the
                  first value

                  (west-most box edge) is larger than the third value (east-most
                  box edge).


                  If the vertical axis is included, the third and the sixth
                  number are

                  the bottom and the top of the 3-dimensional bounding box.


                  If a feature has multiple spatial geometry properties, it is
                  the decision of the

                  server whether only a single spatial geometry property is used
                  to determine

                  the extent or all relevant geometries.
                oneOf:
                  - items:
                      type: number
                    minItems: 4
                    maxItems: 4
                    type: array
                  - items:
                      type: number
                    minItems: 6
                    maxItems: 6
                    type: array
              examples:
                - - - -180
                    - -90
                    - 180
                    - 90
            values:
              description: >-
                Provides information about the spatial resolution available in
                the collection

                for the x and y coordinates  

                as number of repetitions / minimum value / interval (e.g.
                "R720/0/0.5") 

                or a list of the values (e.g. 0, 0.5, 1.0, 1.5 ... 715, 720)
              type: object
              required:
                - x
                - 'y'
              properties:
                x:
                  type: array
                  description: >-
                    x coordinates as number of repetitions / minimum value /
                    interval 

                    (e.g. "R720/0/0.5") or a list of the values 

                    (e.g. 0, 0.5, 1.0, 1.5 ... 715, 720)
                  items:
                    type:
                      - string
                'y':
                  type: array
                  description: >-
                    y coordinates as number of repetitions / minimum value /
                    interval 

                    (e.g. "R361/90/-0.5") or a list of the values 

                    (e.g. 90, 89.5, 89, 88.5 ... -89.5,-90)
                  items:
                    type:
                      - string
            crs:
              description: >-
                Coordinate reference system of the coordinates in the spatial
                extent

                (property `bbox`). The default reference system is WGS 84
                longitude/latitude.

                In the Core this is the only supported coordinate reference
                system.

                Extensions may support additional coordinate reference systems 
              type: string
              enum:
                - GEOGCRS["WGS 84",ENSEMBLE["World Geodetic System 1984 ensemble",MEMBER["World Geodetic System 1984 (Transit)"],MEMBER["World Geodetic System 1984 (G730)"],MEMBER["World Geodetic System 1984 (G873)"],MEMBER["World Geodetic System 1984 (G1150)"],MEMBER["World Geodetic System 1984 (G1674)"],MEMBER["World Geodetic System 1984 (G1762)"],MEMBER["World Geodetic System 1984 (G2139)"],MEMBER["World Geodetic System 1984 (G2296)"],ELLIPSOID["WGS 84",6378137,298.257223563,LENGTHUNIT["metre",1]],ENSEMBLEACCURACY[2.0]],PRIMEM["Greenwich",0,ANGLEUNIT["degree",0.0174532925199433]],CS[ellipsoidal,2],AXIS["geodetic latitude (Lat)",north,ORDER[1],ANGLEUNIT["degree",0.0174532925199433]],AXIS["geodetic longitude (Lon)",east,ORDER[2],ANGLEUNIT["degree",0.0174532925199433]],USAGE[SCOPE["Horizontal component of 3D system."],AREA["World."],BBOX[-90,-180,90,180]],ID["EPSG",4326]]
            name:
              description: Name of the vertical coordinate reference system
              type: string
        temporal:
          description: The temporal extent of the information in the collection.
          type: object
          required:
            - interval
            - trs
          properties:
            interval:
              description: RFC3339 compliant Date and Time
              type: array
              minItems: 1
              items:
                description: >-
                  Begin and end times of the time interval. The timestamps are
                  in the

                  temporal coordinate reference system specified in `trs`. By
                  default

                  this is the Gregorian calendar.
                type: array
                minItems: 2
                maxItems: 2
                items:
                  type:
                    - string
                    - 'null'
            values:
              description: >-
                Provides information about the time intervals available in the
                collection 

                as ISO8601 compliant dates, either as a time range specified 

                as start time / end time  (e.g.
                2025-11-14T09:00Z/2025-11-14T21:00Z)  or

                as number of repetitions / start time / interval (e.g.
                R4/2025-11-14T21:00Z/PT3H) 

                or a list of time values (e.g.

                2025-11-14T09:00Z,2025-11-14T12:00Z,2025-11-14T15:00Z,2025-11-14T18:00Z,2025-11-14T21:00Z)
              type: array
              minItems: 1
              items:
                type:
                  - string
                  - 'null'
                minItems: 1
            trs:
              description: >-
                Coordinate reference system of the coordinates in the temporal
                extent

                (property `interval`). The default reference system is the
                Gregorian calendar.

                In the Core this is the only supported temporal coordinate
                reference system.

                Extensions may support additional temporal coordinate reference
                systems 
              type: string
              examples:
                - >-
                  TIMECRS["DateTime",TDATUM["Gregorian
                  Calendar"],CS[TemporalDateTime,1],AXIS["Time (T)",future]]
              default: https://www.opengis.net/def/uom/ISO-8601/0/Gregorian
            name:
              description: Name of the temporal coordinate reference system
              type: string
        vertical:
          description: The vertical extent of the information in the collection.
          type: object
          required:
            - interval
            - vrs
          properties:
            interval:
              description: >-
                If multiple intervals are provided, the union of the intervals
                describes the vertical extent.
              type: array
              minItems: 1
              items:
                description: >-
                  minimum and maximum heights of the vertical interval. The
                  values are in the

                  vertical coordinate reference system specified in `vrs`. By
                  default

                  this is the vertical coordinate reference system of the source
                  information.
                type: array
                minItems: 1
                items:
                  type:
                    - string
                    - 'null'
              examples:
                - - - '2'
                    - '100'
            values:
              description: >-
                Vertical level intervals that data in the collection is
                available at 

                these can be defined as follows:

                min level / max level (e.g. "2/100") or 

                as number of repetitions / start level / interval
                (e.g."R5/1000/-50") 

                or a list of vertical levels (e.g. "1000","850","500"}

                The value `null` is supported and indicates an open vertical
                interval.
              type: array
              minItems: 1
              items:
                type:
                  - string
                  - 'null'
            vrs:
              description: >-
                Coordinate reference system of the coordinates in the vertical
                extent

                (property `interval`). 
              type: string
              enum:
                - PARAMETRICCRS["WMO standard atmosphere layer 0",PDATUM["Mean Sea Level",ANCHOR["101325 Pa at 15°C"]],CS[parametric,1],AXIS["Station (Pa)",down],PARAMETRICUNIT["Pascal",100.0]]
            name:
              description: Name of the vertical coordinate reference system
              type: string
    crsObject:
      type: object
      required:
        - crs
        - wkt
      properties:
        crs:
          description: >-
            name of the coordinate reference system, used as the value in the
            crs query parameter to define the required output CRS
          type: string
          examples:
            - native
        wkt:
          description: Well Known text description of the coordinate reference system
          type: string
          examples:
            - >-
              GEOGCS["WGS 84",DATUM["WGS_1984",SPHEROID["WGS
              84",6378137,298.257223563,AUTHORITY["EPSG","7030"]],AUTHORITY["EPSG","6326"]],PRIMEM["Greenwich",0,AUTHORITY["EPSG","8901"]],UNIT["degree",0.01745329251994328,AUTHORITY["EPSG","9122"]],AUTHORITY["EPSG","4326"]]
    DataQuery:
      description: >-
        Property to contain any extra metadata information that is specific to
        an individual data query
      type: object
      required:
        - title
        - description
        - output_formats
        - default_output_format
        - crs_details
      properties:
        title:
          description: title of the query
          type: string
          examples:
            - Position query
        description:
          description: description of the query
          type: string
          examples:
            - Query to return data for a defined well known text point
        output_formats:
          description: list of output formats supported by the Position query
          type: array
          items:
            type: string
          examples:
            - - CoverageJSON
              - GeoJSON
              - IWXXM
              - GRIB
        default_output_format:
          description: default output format for the Position query
          type: string
        crs_details:
          description: >-
            List of key/value definitions for the CRS's supported by the
            Position query.  The key is the query parameter and the value is the
            Well Known Text description
          type: array
          items:
            $ref: '#/components/schemas/crsObject'
    positionDataQuery:
      allOf:
        - $ref: '#/components/schemas/DataQuery'
      required:
        - query_type
      properties:
        query_type:
          description: Type of EDR query
          type: string
          enum:
            - position
          examples:
            - position
    positionLink:
      allOf:
        - $ref: '#/components/schemas/link'
      properties:
        href:
          type: string
          examples:
            - https://example.com/collections/monitoringsites/position
        variables:
          $ref: '#/components/schemas/positionDataQuery'
    areaDataQuery:
      allOf:
        - $ref: '#/components/schemas/DataQuery'
      properties:
        query_type:
          description: Type of EDR query
          type: string
          enum:
            - area
          examples:
            - area
    areaLink:
      allOf:
        - $ref: '#/components/schemas/link'
      properties:
        href:
          type: string
          examples:
            - https://example.com/collections/monitoringsites/area
        variables:
          $ref: '#/components/schemas/areaDataQuery'
    locationsDataQuery:
      allOf:
        - $ref: '#/components/schemas/DataQuery'
      properties:
        query_type:
          description: Type of EDR query
          type: string
          enum:
            - locations
          examples:
            - locations
    locationsLink:
      allOf:
        - $ref: '#/components/schemas/link'
      properties:
        href:
          type: string
        variables:
          $ref: '#/components/schemas/locationsDataQuery'
    instancesDataQuery:
      description: >-
        Property to contain any extra metadata information that is specific to
        an individual data queries
      type: object
      properties:
        title:
          description: title of the query
          type: string
          examples:
            - Instances query
        description:
          description: description of the query
          type: string
          examples:
            - Instances of collection each representing different versions
        query_type:
          description: Instances of collection
          type: string
          enum:
            - instances
          examples:
            - instances
    instancesLink:
      allOf:
        - $ref: '#/components/schemas/link'
      properties:
        href:
          type: string
          examples:
            - https://example.com/collections/monitoringsites/instances
        variables:
          $ref: '#/components/schemas/instancesDataQuery'
    units:
      type: object
      title: unit name
      description: definition of data units
      anyOf:
        - required:
            - label
        - required:
            - symbol
        - required:
            - label
            - symbol
      properties:
        label:
          additionalProperties:
            type: string
        symbol:
          title: Describe unit symbol
          oneOf:
            - type: object
              description: Information about the symbol used to describe the units
              required:
                - value
                - type
              properties:
                value:
                  description: representation of the units symbol
                  type: string
                type:
                  description: uri to detailed desxcription of the units
                  type: string
            - type: string
          examples:
            - value: hPa
              type: https://www.opengis.net/def/uom/UCUM/
        id:
          type: string
      examples:
        - label:
            en: Kelvin
          symbol:
            value: K
            type: https://www.opengis.net/def/uom/UCUM/
    observedPropertyCollection:
      type: object
      title: name of property
      description: Description of the property
      required:
        - label
      properties:
        id:
          description: >-
            URI linking to an external registry which contains the definitive
            definition of

            the observed property
          type: string
        label:
          oneOf:
            - type: string
            - type: object
        description:
          type: string
        categories:
          type: array
          items:
            minItems: 1
            type: object
            required:
              - id
              - label
            properties:
              id:
                description: >-
                  URI linking to an external registry which contains the
                  definitive definition of

                  the observed property
                type: string
              label:
                oneOf:
                  - type: string
                  - type: object
              description:
                oneOf:
                  - type: string
                  - type: object
                    required:
                      - en
                    properties:
                      en:
                        type: string
      examples:
        - id: https://vocab.nerc.ac.uk/standard_name/sea_ice_area_fraction/
          label: Sea Ice Concentration
    nsl-parameterNames:
      type: object
      title: Parameter name
      description: Definition of data parameter
      required:
        - type
        - observedProperty
      properties:
        type:
          description: type
          enum:
            - Parameter
        description:
          type: string
        label:
          type: string
        data-type:
          description: Data type of returned parameter
          type: string
          enum:
            - integer
            - float
            - string
        unit:
          $ref: '#/components/schemas/units'
        observedProperty:
          $ref: '#/components/schemas/observedPropertyCollection'
        categoryEncoding:
          type: object
          additionalProperties:
            oneOf:
              - type: integer
              - type: array
                items:
                  type: integer
        extent:
          $ref: '#/components/schemas/extent'
        id:
          description: >-
            Unique ID of the parameter, this is the value used for querying the
            data
          type: string
        measurementType:
          type: object
          title: Parameter measurement approach
          description: Approach to calculating the data values
          required:
            - method
          properties:
            method:
              type: string
              examples:
                - mean
            duration:
              type: string
              title: Measurement time duration
              description: >-
                The time duration that the value was calculated for as an
                RFC3339 duration value.  If the method value is instantaneous
                this value is not required.
              examples:
                - PT10M
      examples:
        - type: Parameter
          id: sea_ice
          description: Sea Ice concentration (ice=1;no ice=0)
          unit:
            label: Ratio
            symbol:
              value: '1'
              type: https://www.opengis.net/def/uom/UCUM/
          observedProperty:
            id: https://vocab.nerc.ac.uk/standard_name/sea_ice_area_fraction/
            label: Sea Ice Concentration
    nsl-collection:
      type: object
      required:
        - links
        - id
        - extent
        - data_queries
        - parameter_names
        - output_formats
        - crs
      properties:
        links:
          type: array
          items:
            $ref: '#/components/schemas/link'
          examples:
            - - href: https://example.org/service/description.html
                hreflang: en
                rel: service-doc
                type: text/html
                title: ''
              - href: https://example.org/service/licence.html
                hreflang: en
                rel: licence
                type: text/html
                title: ''
              - href: https://example.org/service/terms-and-conditions.html
                hreflang: en
                rel: restrictions
                type: text/html
                title: ''
        id:
          description: id of the collection
          type: string
        title:
          description: title of the collection
          type: string
        description:
          description: description of the collection
          type: string
        keywords:
          description: List of keywords which help to describe the collection
          type: array
          items:
            type: string
        extent:
          $ref: '#/components/schemas/extent'
        data_queries:
          description: Detailed information relevant to individual query types
          type: object
          properties:
            instances:
              type: object
              properties:
                link:
                  $ref: '#/components/schemas/instancesLink'
        crs:
          description: >-
            list of the coordinate reference systems the collection results can
            support
          type: array
          items:
            type: string
          enum:
            - EPSG:4326
        output_formats:
          description: list of formats the results can be presented in
          type: array
          items:
            type: string
          examples:
            - - CoverageJSON
              - GeoJSON
              - GRIB
        parameter_names:
          description: list of the data parameters available in the collection
          type: object
          additionalProperties:
            items:
              $ref: '#/components/schemas/nsl-parameterNames'
    collections:
      type: object
      required:
        - links
        - collections
      properties:
        links:
          type: array
          items:
            $ref: '#/components/schemas/link'
          examples:
            - - href: https://example.org/edr/collections
                hreflang: en
                rel: self
                type: application/yaml
              - href: https://example.org/edr/collections?f=html
                hreflang: en
                rel: alternate
                type: text/html
              - href: https://example.org/edr/collections?f=xml
                hreflang: en
                rel: alternate
                type: application/xml
        collections:
          type: array
          items:
            $ref: '#/components/schemas/nsl-collection'
    nsl-instances:
      type: object
      required:
        - links
        - instances
      properties:
        links:
          type: array
          items:
            $ref: '#/components/schemas/link'
          examples:
            - href: https://example.org/edr/collections/the_collection_id/instances
              hreflang: en
              rel: self
              type: application/json
            - href: >-
                https://example.org/edr/collections/the_collection_id/instances?f=html
              hreflang: en
              rel: alternate
              type: text/html
            - href: >-
                https://example.org/edr/collections/the_collection_id/instances?f=xml
              hreflang: en
              rel: alternate
              type: application/xml
        instances:
          type: array
          items:
            $ref: '#/components/schemas/nsl-instance'
    nsl-instance:
      type: object
      required:
        - links
        - id
        - extent
        - data_queries
        - parameter_names
        - output_formats
        - crs
      properties:
        links:
          type: array
          items:
            $ref: '#/components/schemas/link'
          examples:
            - - href: https://example.org/service/description.html
                hreflang: en
                rel: service-doc
                type: text/html
                title: ''
              - href: https://example.org/service/licence.html
                hreflang: en
                rel: licence
                type: text/html
                title: ''
              - href: https://example.org/service/terms-and-conditions.html
                hreflang: en
                rel: restrictions
                type: text/html
                title: ''
        id:
          description: id of the collection
          type: string
          examples:
            - Metar data
        title:
          description: title of the collection
          type: string
          examples:
            - Metar observations
        description:
          description: description of the collection
          type: string
          examples:
            - Last 24 hours Metar observations
        keywords:
          description: List of keywords which help to describe the collection
          type: array
          items:
            type: string
        extent:
          $ref: '#/components/schemas/extent'
        data_queries:
          description: Detailed information relevant to individual query types
          type: object
          properties:
            position:
              type: object
              properties:
                link:
                  $ref: '#/components/schemas/positionLink'
            area:
              type: object
              properties:
                link:
                  $ref: '#/components/schemas/areaLink'
            cube:
              type: object
              properties:
                link:
                  $ref: '#/components/schemas/cubeLink'
        crs:
          description: >-
            list of the coordinate reference systems the collection results can
            support
          type: array
          items:
            type: string
        output_formats:
          description: list of formats the results can be presented in
          type: array
          items:
            type: string
          examples:
            - - CoverageJSON
              - GeoJSON
              - GRIB2
        parameter_names:
          description: list of the data parameters available in the collection
          type: object
          additionalProperties:
            items:
              $ref: '#/components/schemas/nsl-parameterNames'
  responses:
    'nsl-200':
      description: >-
        Data ranges required to construct valid queries for the choosen data
        collection
      content:
        application/vnd.cov+json:
          schema:
            $ref: 'https://covjson.org/schema/dev/coveragejson.json'
        application/geo+json:
          schema:
            $ref: 'https://raw.githubusercontent.com/opengeospatial/ogc-feat-geo-json/refs/heads/main/core/schemas/jsonfg-object.json'
        application/netcdf:
          schema:
            type: object
        application/grib2;edition=2:
          schema:
            type: object
        text/csv:
          schema:
            type: string

    '204':
      description: A succesful request, but the resource has no data resulting from the request.
    '400':
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/exception'
    '404':
      description: Requested data not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/exception'
    '413':
      description: Requested data volume to large to be handled by this service.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/exception'
    '500':
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/exception'
    exception:
      description: An error occured.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/exception'
        text/html:
          schema:
            type: string
    collections:
      description: Metadata about the Environmental data collections shared by this API
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/collections'
        text/html:
          schema:
            type: string
    nsl-collection:
      description: Metadata about the {collectionid} collection shared by this API
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/nsl-collection'
        text/html:
          schema:
            type: string
    nsl-instances:
      description: >-
        Metadata about the instances of {collectionid} collection shared by this
        API
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/nsl-instances'
        text/html:
          schema:
            type: string
    nsl-instance:
      description: >-
        Metadata about the instance of {collectionid} collection shared by this
        API
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/nsl-instance'
        text/html:
          schema:
            type: string
  requestBodies:
    nsl-position:
      content:
        application/json:
          schema:
            type: object
            required:
              - coords
            properties:
              coords:
                description: Well Known Text Point definition
                type: string
              datetime:
                type: string
              parameter-name:
                type: array
                items:
                  type: string
              crs:
                type: string
              f:
                type: string
                enum:
                  - CoverageJSON
                  - GeoJSON
                  - CSV
              limit:
                type: number
    nsl-area:
      content:
        application/json:
          schema:
            type: object
            required:
              - coords
            properties:
              coords:
                description: Well Known Text Polygon definition
                type: string
              datetime:
                type: string
              parameter-name:
                type: array
                items:
                  type: string
              crs:
                type: string
              resolution-x:
                type: string
              resolution-y:
                type: string
              f:
                type: string
              limit:
                type: number
    nsl-location:
      content:
        application/json:
          schema:
            type: object
            required:
              - coords
            properties:
              datetime:
                type: string
              parameter-name:
                type: array
                items:
                  type: string
              crs:
                type: string
              f:
                type: string
                enum:
                  - CoverageJSON
                  - GeoJSON
                  - CSV
              limit:
                type: number
